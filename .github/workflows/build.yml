name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:  # 手动触发
  workflow_call:       # 允许被其他 workflow 引用（release.yml）

jobs:
  build:
    name: Build Translate.app
    runs-on: macos-14  # GitHub 提供的 macOS Sonoma runner，自带 Xcode 15+

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        run: |
          set -euo pipefail
          APP_NAME="Translate"
          BIN_PATH=$(swift build -c release --show-bin-path)
          EXE="$BIN_PATH/$APP_NAME"

          if [ ! -f "$EXE" ]; then
            echo "❌ 找不到可执行文件: $EXE"
            ls -la "$BIN_PATH"
            exit 1
          fi

          APP_DIR="build/${APP_NAME}.app"
          rm -rf build
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp "$EXE" "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          chmod +x "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          cp Info/Info.plist "${APP_DIR}/Contents/Info.plist"

          # 嵌入 SPM 资源包（KeyboardShortcuts 的本地化 .bundle 等）
          # Bundle.module 会在 .app/Contents/Resources/<name>_<target>.bundle 查找
          SPM_BUNDLES=$(find "$BIN_PATH" -name "*.bundle" 2>/dev/null || true)
          if [ -n "$SPM_BUNDLES" ]; then
            echo "$SPM_BUNDLES" | while read -r b; do
              echo "✅ 嵌入资源包: $(basename "$b")"
              cp -R "$b" "${APP_DIR}/Contents/Resources/"
            done
          else
            echo "⚠️  没找到 SPM 资源包"
          fi

          # 签名策略：不使用 --deep（会破坏 nested SPM .bundle 的 _CodeSignature 和 Info.plist）
          # 注意：不能把 codesign 输出 pipe 给 head（head 提前关闭管道 → SIGPIPE → codesign 失败）
          # 不能用 || true 吞掉错误（会掩盖 bundle 未签名的问题 → macOS 15 拒绝加载 → crash）
          # 1) 清理所有 nested 现有签名
          find "${APP_DIR}" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          # 2) 先签 nested .bundle
          BUNDLE_LIST=$(find "${APP_DIR}/Contents/Resources" -name "*.bundle" 2>/dev/null || true)
          if [ -n "$BUNDLE_LIST" ]; then
            while IFS= read -r b; do
              [ -z "$b" ] && continue
              echo "  signing bundle: $(basename "$b")"
              codesign --force --sign - "$b"
            done <<< "$BUNDLE_LIST"
          fi
          # 3) 签主二进制
          codesign --force --sign - "${APP_DIR}/Contents/MacOS/Translate"
          # 4) 最后签 .app 顶层（不带 --deep）
          codesign --force --sign - "${APP_DIR}"
          # 5) 验证 bundle 能加载
          echo "---- 验证 Bundle.module ----"
          ls -la "${APP_DIR}/Contents/Resources/" | head -10

          # 校验
          echo "---- .app 内容 ----"
          find "${APP_DIR}" -maxdepth 3 -print

          # 打包 zip 方便下载
          cd build
          zip -ry "${APP_NAME}.app.zip" "${APP_NAME}.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Translate
          path: build/Translate.app.zip
          if-no-files-found: error
          retention-days: 14
