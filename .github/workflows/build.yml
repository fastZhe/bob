name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:  # 手动触发
  workflow_call:       # 允许被其他 workflow 引用（release.yml）

jobs:
  build:
    name: Build Translate.app
    runs-on: macos-14  # GitHub 提供的 macOS Sonoma runner，自带 Xcode 15+

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        run: |
          set -euo pipefail
          APP_NAME="Translate"
          BIN_PATH=$(swift build -c release --show-bin-path)
          EXE="$BIN_PATH/$APP_NAME"

          if [ ! -f "$EXE" ]; then
            echo "❌ 找不到可执行文件: $EXE"
            ls -la "$BIN_PATH"
            exit 1
          fi

          APP_DIR="build/${APP_NAME}.app"
          rm -rf build
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp "$EXE" "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          chmod +x "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          cp Sources/Translate/Resources/Info.plist "${APP_DIR}/Contents/Info.plist"

          # 嵌入 SPM 资源包（.build 里的 .bundle）
          SPM_BUNDLE=$(find "$BIN_PATH" -maxdepth 2 -name "*.bundle" | head -1 || true)
          if [ -n "$SPM_BUNDLE" ]; then
            cp -R "$SPM_BUNDLE" "${APP_DIR}/Contents/Resources/"
            echo "✅ 嵌入资源包: $(basename "$SPM_BUNDLE")"
          fi

          # ad-hoc 签名（避免 Gatekeeper 拦截；首次运行用户需右键"打开"）
          codesign --force --deep --sign - "${APP_DIR}" || true

          # 校验
          echo "---- .app 内容 ----"
          find "${APP_DIR}" -maxdepth 3 -print

          # 打包 zip 方便下载
          cd build
          zip -ry "${APP_NAME}.app.zip" "${APP_NAME}.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Translate
          path: build/Translate.app.zip
          if-no-files-found: error
          retention-days: 14
