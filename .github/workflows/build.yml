name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:  # 手动触发
  workflow_call:       # 允许被其他 workflow 引用（release.yml）

jobs:
  build:
    name: Build Translate.app
    runs-on: macos-14  # GitHub 提供的 macOS Sonoma runner，自带 Xcode 15+

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve SPM dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        run: |
          set -euo pipefail
          APP_NAME="Translate"
          BIN_PATH=$(swift build -c release --show-bin-path)
          EXE="$BIN_PATH/$APP_NAME"

          if [ ! -f "$EXE" ]; then
            echo "❌ 找不到可执行文件: $EXE"
            ls -la "$BIN_PATH"
            exit 1
          fi

          APP_DIR="build/${APP_NAME}.app"
          rm -rf build
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp "$EXE" "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          chmod +x "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          cp Info/Info.plist "${APP_DIR}/Contents/Info.plist"

          # 嵌入 SPM 资源包（KeyboardShortcuts 的本地化 .bundle 等）
          # 关键：SPM 为可执行 target 生成的 resource_bundle_accessor 在运行时
          # 用 Bundle.main.bundleURL（即 .app 根目录）拼接 "<name>.bundle" 来查找，
          # 不查 Contents/Resources。所以必须把 .bundle 放到 .app 根（与 Contents 同级），
          # 否则点开「设置-快捷键」时 Recorder 初始化触发 Bundle.module fatalError（SIGTRAP）。
          SPM_BUNDLES=$(find "$BIN_PATH" -name "*.bundle" 2>/dev/null || true)
          if [ -n "$SPM_BUNDLES" ]; then
            echo "$SPM_BUNDLES" | while read -r b; do
              echo "✅ 嵌入资源包: $(basename "$b")"
              cp -R "$b" "${APP_DIR}/"
            done
          else
            echo "⚠️  没找到 SPM 资源包"
          fi

          # 签名策略：先签 nested .bundle，再用 --deep 签整个 .app
          # 1) 清理所有 nested 现有签名
          find "${APP_DIR}" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          # 2) 先签 .bundle（位于 .app 根，与 Contents 同级）
          BUNDLE_LIST=$(find "${APP_DIR}" -maxdepth 1 -name "*.bundle" 2>/dev/null || true)
          if [ -n "$BUNDLE_LIST" ]; then
            while IFS= read -r b; do
              [ -z "$b" ] && continue
              echo "  signing bundle: $(basename "$b")"
              codesign --force --sign - "$b"
            done <<< "$BUNDLE_LIST"
          fi
          # 3) 签整个 .app（--deep 会同时签主二进制，.bundle 已签好不会被破坏）
          codesign --force --deep --sign - "${APP_DIR}"
          # 5) 验证 bundle 在 .app 根（accessor 查找路径）
          echo "---- 验证 Bundle.module（bundle 应在 .app 根）----"
          ls -la "${APP_DIR}/" | grep -i bundle || echo "⚠️  .app 根下没有 .bundle"

          # 校验
          echo "---- .app 内容 ----"
          find "${APP_DIR}" -maxdepth 3 -print

          # 打包 zip 方便下载
          cd build
          zip -ry "${APP_NAME}.app.zip" "${APP_NAME}.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Translate
          path: build/Translate.app.zip
          if-no-files-found: error
          retention-days: 14
